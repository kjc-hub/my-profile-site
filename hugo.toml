baseURL = 'https://yourname.com/'
languageCode = 'en-us'
title = '[Your Name] | Social Work Portfolio'
theme = 'hugo-profile'

# Site parameters
[params]
  avatar = 'images/profile.jpg'
  logo = 'images/logo.png'
  favicon = 'images/favicon.ico'
  description = 'Professional portfolio of [Your Name], MA Social Work Candidate'
  
  # Social links
  [[params.social]]
    icon = 'fa-linkedin'
    title = 'LinkedIn'
    url = 'https://linkedin.com/in/yourusername'
  
  [[params.social]]
    icon = 'fa-envelope'
    title = 'Email'
    url = 'mailto:you@example.com'

